# Chile ticker map.
#
# provider: bloomberg | haver
# frequency: D | M | Q | A
# transform: level | yoy | mom | qoq | saar  (computed in pipeline if set)
# tab: monthly | quarterly | annual | credit | markets
# Haver tickers use the form <code>@<database>. Verify DB code matches your subscription.
# Bloomberg tickers use the form "<TICKER> <YELLOW KEY>".

country: Chile
iso: CL
currency: CLP

series:

  # ─────────────────────── MONTHLY ───────────────────────
  - name: cpi_headline_yoy
    label: "CPI headline, YoY"
    provider: haver
    ticker: c917cpi@chile
    frequency: M
    tab: monthly
    category: prices
    units: pct
    transform: yoy
    chart: true

  - name: cpi_core_yoy
    label: "CPI core (ex food & energy), YoY"
    provider: haver
    ticker: c917cpx@chile
