# Argentina ticker map.
#
# Notes specific to Argentina:
# - CPI history has structural breaks (INDEC pre-2007, IPC-CABA / IPC-Congreso bridges, post-2017 INDEC).
#   The pipeline keeps levels but flags YoY rates >100% so charts can switch axes.
# - FX has multiple parallel rates: official (BCRA A3500), MEP (AL30/GD30 cash mkt), CCL (blue chip swap),
#   blue (informal). Pipeline computes brecha (gap) vs official.
# - Fiscal: tracks both Tesoro Nacional primary balance and SPN (sector publico nacional).
#
# Verify Haver DB code against your subscription. ARGENT is the standard.
# For BCRA daily series, EMERGE and BCRA databases also work.

country: Argentina
iso: AR
currency: ARS

series:

  # ─────────────────────── MONTHLY ───────────────────────
  - name: cpi_headline_yoy
    label: "CPI national, YoY"
    provider: haver
    ticker: c213cpi@argent
    frequency: M
    tab: monthly
    category: prices
    units: pct
    transform: yoy
    chart: true

  - name: cpi_headline_mom
    label: "CPI national, MoM"
    provider: haver
    ticker: c213cpi@argent
